<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wordle</title>
    <style>
        body { background-color: #121213; color: white; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; }
        #game-board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-top: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .tile { width: 58px; height: 58px; border: 2px solid #3a3a3c; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; text-transform: uppercase; transition: transform 0.2s; }
        .tile.filled { border-color: #565758; }
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }

        input { margin-top: 20px; padding: 10px; background: #121213; border: 1px solid #3a3a3c; color: white; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        #message { margin-top: 20px; font-weight: bold; height: 24px; }
    </style>
</head>
<body>

    <h1>WORDLE</h1>
    <p>Made by SamYT124</p>
    <div id="game-board"></div>
    <input type="text" id="guess-input" maxlength="5" autofocus placeholder="Type here">
    <div id="message"></div>

    <script>
        const wordlist = [
  "above", "actor", "acute", "admit", "adopt", "adult", "after", "again", "agent", "agree",
  "ahead", "alarm", "album", "alert", "alike", "alive", "allow", "alone", "along", "alter",
  "among", "anger", "angle", "angry", "apart", "apple", "apply", "arena", "argue", "arise",
  "array", "aside", "asset", "audio", "audit", "avoid", "award", "aware", "awful", "basic",
  "basis", "beach", "begin", "below", "bench", "billy", "birth", "black", "blade", "blank",
  "blast", "blend", "block", "blood", "board", "boost", "booth", "bound", "brain", "brand",
  "bread", "break", "breed", "brief", "bring", "broad", "broke", "brown", "brush", "build",
  "built", "buyer", "cable", "calms", "canal", "carry", "catch", "cause", "chain", "chair",
  "chalk", "chaos", "charm", "chart", "cheap", "check", "cheek", "chess", "chest", "chief",
  "child", "china", "choir", "chord", "chose", "civil", "claim", "class", "clean", "clear",
  "click", "climb", "clock", "close", "cloth", "cloud", "coach", "coast", "count", "court",
  "cover", "craft", "crash", "cream", "crime", "cross", "crowd", "crown", "curve", "cycle",
  "daily", "dance", "dated", "dealt", "death", "debut", "delay", "depth", "diary", "dirty",
  "doubt", "dozen", "draft", "drama", "drawn", "dream", "dress", "drill", "drink", "drive",
  "drove", "dying", "eager", "early", "earth", "eight", "elite", "empty", "enemy", "enjoy",
  "enter", "entry", "equal", "error", "event", "every", "exact", "exist", "extra", "faith",
  "false", "fault", "feast", "fiber", "field", "fifth", "fifty", "fight", "final", "first",
  "fixed", "flame", "flash", "fleet", "floor", "fluid", "flute", "focus", "force", "forth",
  "forty", "forum", "found", "frame", "frank", "fraud", "fresh", "front", "fruit", "fully",
  "funny", "giant", "given", "glass", "globe", "going", "grade", "grand", "grant", "grape",
  "grass", "great", "green", "grill", "gross", "group", "grown", "guard", "guess", "guest",
  "guide", "habit", "happy", "harsh", "heart", "heavy", "hence", "hotel", "house", "human",
  "ideal", "image", "index", "inner", "input", "issue", "joint", "judge", "juice", "known",
  "label", "large", "laser", "later", "laugh", "layer", "learn", "lease", "least", "leave",
  "legal", "lemon", "level", "light", "limit", "links", "lives", "local", "logic", "loose",
  "lower", "lucky", "lunch", "lying", "magic", "major", "maker", "march", "match", "maybe",
  "mayor", "meant", "media", "melon", "metal", "might", "minor", "minus", "mixed", "model",
  "money", "month", "moral", "motor", "mount", "mouse", "mouth", "movie", "music", "needs",
  "never", "newly", "night", "noise", "north", "noted", "novel", "nurse", "occur", "ocean",
  "offer", "often", "order", "other", "ought", "paint", "panel", "paper", "party", "peace"
        ];
        const SECRET = wordlist[Math.floor(Math.random() * wordlist.length)].toUpperCase();
        let currentAttempt = 0;
        const board = document.getElementById("game-board");
        const input = document.getElementById("guess-input");
        const msg = document.getElementById("message");

        for (let i = 0; i < 6; i++) {
            const row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < 5; j++) {
                const tile = document.createElement("div");
                tile.className = "tile";
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                const guess = input.value.toUpperCase();
                if (guess.length !== 5) {
                    msg.textContent = "Must be 5 letters!";
                    return;
                }
                processGuess(guess);
                input.value = "";
            }
        });

        function processGuess(guess) {
            const row = board.children[currentAttempt];
            const tiles = row.children;
            let secretCheck = SECRET.split("");
            for (let i = 0; i < 5; i++) {
                tiles[i].textContent = guess[i];
                if (guess[i] === SECRET[i]) {
                    tiles[i].classList.add("correct");
                    secretCheck[i] = null; 
                }
            }
            for (let i = 0; i < 5; i++) {
                if (tiles[i].classList.contains("correct")) continue;

                const indexInSecret = secretCheck.indexOf(guess[i]);
                if (indexInSecret > -1) {
                    tiles[i].classList.add("present");
                    secretCheck[indexInSecret] = null;
                } else {
                    tiles[i].classList.add("absent");
                }
            }

            if (guess === SECRET) {
                msg.textContent = "You got it! Refresh the page to play again.";
                input.disabled = true;
            } else {
                currentAttempt++;
                if (currentAttempt === 6) {
                    msg.textContent = `Game Over. It was ${SECRET}`;
                    input.disabled = true;
                }
            }
        }
    </script>
</body>
</html>
